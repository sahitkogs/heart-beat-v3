# Releases heart•beat v3 to the Play Console Internal Testing track.
#
# Trigger: pushing an annotated tag matching `v*` (e.g. v1.0.5-phase10.4.3b),
# or manually via the "Run workflow" button on the Actions tab.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of android/upload-keystore.jks
#                              (on PowerShell:
#                                [Convert]::ToBase64String(
#                                  [IO.File]::ReadAllBytes(
#                                    "android/upload-keystore.jks")) > ks.b64
#                              then paste the contents of ks.b64)
#   ANDROID_KEYSTORE_PASSWORD  storePassword from android/key.properties
#   ANDROID_KEY_PASSWORD       keyPassword from android/key.properties
#   ANDROID_KEY_ALIAS          keyAlias from android/key.properties (usually `upload`)
#   PLAY_SERVICE_ACCOUNT_JSON  full JSON of the Play Developer API service
#                              account key. Create at Play Console →
#                              Setup → API access → Create new service
#                              account, then grant it Release Manager on
#                              the heart•beat app.

name: Release to Play Internal Testing

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Console track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so the tag is reachable

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - name: Decode keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 --decode > android/upload-keystore.jks
          # sanity: keytool exit 0 means the file decoded into a valid JKS
          keytool -list -keystore android/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            > /dev/null

      - name: Write key.properties
        run: |
          cat > android/key.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: flutter test (gate the release)
        run: flutter test

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Write Play service-account JSON
        env:
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$SA_JSON" > /tmp/play-service-account.json

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: /tmp/play-service-account.json
          packageName: com.sahitkogs.heartbeat
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          releaseName: ${{ github.ref_name }}
          # status: completed → auto-rollout to 100% of the selected track
          # (Internal by default), so opted-in testers see the new build
          # immediately. Switch back to `draft` if you ever want to stage
          # release notes in the Play Console before rollout.
          # The action's mappingFile + whatsNewDirectory inputs are
          # intentionally omitted — release notes can be edited in the
          # Play Console after rollout.

      - name: Clean up secrets
        if: always()
        run: |
          rm -f android/upload-keystore.jks android/key.properties /tmp/play-service-account.json
